name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build UI + CLI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies (UI)
        run: npm install

      - name: Install CLI dependencies
        working-directory: cli
        run: npm install

      - name: Build UI (Next.js)
        run: npm run build

      - name: Build CLI (esbuild)
        working-directory: cli
        run: npm run build

  publish:
    name: npm publish (${{ github.event.release.prerelease && 'prerelease' || 'latest' }})
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install CLI dependencies
        working-directory: cli
        run: npm install

      - name: Set version from release tag
        id: version
        working-directory: cli
        env:
          TAG_NAME: ${{ github.event.release.tag_name || '' }}
          IS_PRERELEASE: ${{ github.event.release.prerelease || false }}
        run: |
          if [ -z "${TAG_NAME}" ]; then
            NPM_VERSION=$(node -p "require('./package.json').version")
          else
            NPM_VERSION="${TAG_NAME#v}"
          fi
          npm pkg set version="${NPM_VERSION}"
          echo "version=${NPM_VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Publish — latest
        if: steps.version.outputs.is_prerelease != 'true'
        working-directory: cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --tag latest

      - name: Publish — prerelease
        if: steps.version.outputs.is_prerelease == 'true'
        working-directory: cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PRERELEASE_ID="${VERSION#*-}"
          PRERELEASE_TAG="${PRERELEASE_ID%%.*}"
          npm publish --tag "${PRERELEASE_TAG}"
