name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: npm publish (${{ github.event.release.prerelease && 'prerelease' || 'latest' }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set version from release tag
        env:
          TAG_NAME: ${{ github.event.release.tag_name || 'v0.0.0-dispatch' }}
          IS_PRERELEASE: ${{ github.event.release.prerelease || false }}
        run: |
          # Strip leading "v" from tag to get npm version
          NPM_VERSION="${TAG_NAME#v}"

          # Override package version
          npm pkg set version="${NPM_VERSION}"

          echo "VERSION=${NPM_VERSION}" >> "$GITHUB_ENV"
          echo "IS_PRERELEASE=${IS_PRERELEASE}" >> "$GITHUB_ENV"

      - name: Build CLI (esbuild)
        run: npm run build

      - name: Publish — latest
        if: env.IS_PRERELEASE != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "Publishing latest: version=${VERSION}, npm-tag=latest"
          npm publish --tag latest

      - name: Publish — prerelease
        if: env.IS_PRERELEASE == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Extract pre-release tag from version after first "-"
          # e.g. "1.1.2-beta.1" → prerelease-id="beta.1" → tag="beta"
          PRERELEASE_ID="${VERSION#*-}"
          PRERELEASE_TAG="${PRERELEASE_ID%%.*}"

          echo "Publishing prerelease: version=${VERSION}, npm-tag=${PRERELEASE_TAG}"
          npm publish --tag "${PRERELEASE_TAG}"
