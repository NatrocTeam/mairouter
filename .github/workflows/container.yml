name: Publish to GitHub Container Registry

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      git_tag:
        description: "Git tag, example: v1.1.0 or v1.1.0-alpha.1"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.git_tag || github.event.release.tag_name }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository from git tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.git_tag }}

      - name: Set version from git tag
        id: version
        shell: bash
        env:
          RAW_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.git_tag }}
        run: |
          if [ -z "$RAW_TAG" ]; then
            echo "Git tag is empty."
            echo "Expected: vX.Y.Z or vX.Y.Z-alpha.1"
            exit 1
          fi

          if ! echo "$RAW_TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[a-z]+(\.[0-9]+)?)?$'; then
            echo "Invalid git tag: $RAW_TAG"
            echo "Expected:"
            echo "  vX.Y.Z"
            echo "  vX.Y.Z-alpha.1"
            echo "  vX.Y.Z-beta.1"
            echo "  vX.Y.Z-rc.1"
            exit 1
          fi

          VERSION="${RAW_TAG#v}"
          IMAGE_NAME_LOWER="$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')"
          IMAGE="${REGISTRY}/${IMAGE_NAME_LOWER}"

          echo "raw_tag=$RAW_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

          echo "Git tag: $RAW_TAG"
          echo "Container version: $VERSION"
          echo "Container image: $IMAGE"

      - name: Set Docker tags
        id: docker_tags
        shell: bash
        env:
          IMAGE: ${{ steps.version.outputs.image }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          {
            echo "tags<<EOF"
            echo "${IMAGE}:${VERSION}"

            if ! echo "$VERSION" | grep -q '-'; then
              echo "${IMAGE}:latest"
            fi

            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Docker tags:"
          echo "${IMAGE}:${VERSION}"

          if ! echo "$VERSION" | grep -q '-'; then
            echo "${IMAGE}:latest"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: |
            linux/amd64
            linux/arm64
          tags: ${{ steps.docker_tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=mairouter
            org.opencontainers.image.description=Local AI routing gateway
            org.opencontainers.image.vendor=NatrocTeam
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
